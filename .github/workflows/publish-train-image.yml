name: Publish training image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile.train
      - deploy/requirements-train.txt
      - deploy/train_*.sh
      - scripts/**
      - .github/workflows/publish-train-image.yml

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.train
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/handpose-train:${{ github.sha }}
            ghcr.io/${{ github.repository }}/handpose-train:${{ steps.vars.outputs.short_sha }}
            ghcr.io/${{ github.repository }}/handpose-train:latest
